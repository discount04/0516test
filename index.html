<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6N6KHDDNJQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6N6KHDDNJQ');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가방 요정 스티커북</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        /* 전달받은 파스텔 무드의 컬러 팔레트 적용 */
        :root {
            --main-font: 'Dongle', sans-serif;
            --gothic-font: 'IBM Plex Sans KR', sans-serif;
            --color-light-green: #DDF8CD;
            --color-sage-green: #5C9E6A;
            --color-slate-blue: #8AA2C7;
            --color-muted-pink: #FA86C4;
            --color-cream: #FCF5EC;
            --bag-scale: 1.0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #E2E8F0;
            background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--main-font);
            color: #4a453e;
        }

        #app-shell {
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            background-color: var(--color-cream);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            touch-action: none;
            overscroll-behavior: none;
        }

        @media (min-width: 640px) {
            #app-shell {
                height: 92vh;
                border-radius: 36px;
                border: 8px solid #ffffff;
            }
        }

        .gothic-text, button, p, span:not(.emoji), input {
            font-family: var(--gothic-font);
        }

        .dongle-title, h1, h2, h3, #status-label, #res-label, .dongle-font {
            font-family: var(--main-font);
            line-height: 0.9;
        }

        .notebook-canvas {
            background-color: #ffffff;
            background-image: 
                linear-gradient(#f3ece1 1px, transparent 1px),
                linear-gradient(90deg, #f3ece1 1px, transparent 1px);
            background-size: 22px 22px;
        }

        .diary-title {
            font-size: 2.2rem;
            letter-spacing: -0.02em;
        }

        .washi-tape {
            background-color: var(--color-light-green);
            opacity: 0.85;
            transform: rotate(-1.5deg);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.03);
            border-left: 2px dashed rgba(255,255,255,0.5);
            border-right: 2px dashed rgba(255,255,255,0.5);
        }

        /* 흰색 다이컷 칼선 스티커 스타일 필터 */
        .sticker-die-cut {
            filter: drop-shadow(2px 0px 0px #ffffff)
                    drop-shadow(-2px 0px 0px #ffffff)
                    drop-shadow(0px 2px 0px #ffffff)
                    drop-shadow(0px -2px 0px #ffffff)
                    drop-shadow(1.5px 1.5px 0px #ffffff)
                    drop-shadow(-1.5px -1.5px 0px #ffffff)
                    drop-shadow(1.5px -1.5px 0px #ffffff)
                    drop-shadow(-1.5px 1.5px 0px #ffffff)
                    drop-shadow(0px 5px 6px rgba(0, 0, 0, 0.2));
        }

        .sticker-label {
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(2.5px);
            color: white;
            padding: 2.5px 7px;
            border-radius: 6px;
            font-size: 9px;
            font-family: var(--gothic-font);
            white-space: nowrap;
            pointer-events: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        .animate-float { animation: floating 4s infinite ease-in-out; }

        @keyframes jiggle-bag {
            0% { transform: scale(var(--bag-scale)) rotate(0deg); }
            12% { transform: scale(calc(var(--bag-scale) * 1.25), calc(var(--bag-scale) * 0.75)) rotate(-6deg); }
            30% { transform: scale(calc(var(--bag-scale) * 0.82), calc(var(--bag-scale) * 1.18)) rotate(5deg); }
            48% { transform: scale(calc(var(--bag-scale) * 1.12), calc(var(--bag-scale) * 0.9)) rotate(-3deg); }
            68% { transform: scale(calc(var(--bag-scale) * 0.94), calc(var(--bag-scale) * 1.06)) rotate(1deg); }
            85% { transform: scale(calc(var(--bag-scale) * 1.02), calc(var(--bag-scale) * 0.98)) rotate(0deg); }
            100% { transform: scale(var(--bag-scale)) rotate(0deg); }
        }
        .bag-jiggle { animation: jiggle-bag 0.65s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .page-transition { transition: opacity 0.3s ease, transform 0.3s ease; }

        @keyframes app-jiggle {
            0% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
            100% { transform: rotate(-2deg); }
        }
        .edit-jiggle { animation: app-jiggle 0.3s infinite; }

        .calendar-grid-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .draggable-sticker {
            position: absolute;
            user-select: none;
            touch-action: none;
            cursor: grab;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }
        .draggable-sticker:active { cursor: grabbing; z-index: 50; }
        .draggable-sticker.dragging { opacity: 0.95; transform: scale(1.15) !important; }

        .ghost-sticker {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="app-shell">

        <!-- 1. 랜딩 페이지 -->
        <div id="landing-page" class="absolute inset-0 z-[200] bg-[var(--color-cream)] flex flex-col items-center justify-center p-8 text-center page-transition">
            <div class="mb-4 animate-float">
                <div class="text-[100px] leading-none mb-2 select-none">🧚</div>
                <div class="inline-block bg-[var(--color-light-green)] text-[var(--color-sage-green)] px-4 py-1 rounded-full font-bold text-sm tracking-widest uppercase gothic-text">My Bag Fairy</div>
            </div>
            <h1 class="text-6xl font-bold italic mb-6 leading-none dongle-title">가방 요정<br><span class="text-[var(--color-slate-blue)] underline decoration-[var(--color-muted-pink)] decoration-4">기록장</span></h1>
            
            <!-- 입력 상자 글씨 밀착 정렬 반영 -->
            <div class="w-full max-w-xs space-y-2 mb-6 flex flex-col items-center">
                <input type="text" id="username-input" placeholder="나만의 닉네임" maxlength="10" 
                       class="w-full px-4 py-2.5 bg-white border-2 border-[var(--color-light-green)] rounded-xl text-center font-bold text-sm focus:outline-none focus:border-[var(--color-slate-blue)] transition-all shadow-inner gothic-text tracking-normal">
                <input type="password" id="pin-input" placeholder="비밀번호 4자리 (숫자)" maxlength="4" pattern="[0-9]*" inputmode="numeric"
                       class="w-full px-4 py-2.5 bg-white border-2 border-[var(--color-light-green)] rounded-xl text-center font-bold text-sm focus:outline-none focus:border-[var(--color-slate-blue)] transition-all shadow-inner gothic-text tracking-normal">
            </div>

            <!-- 💡 버튼 패딩 조정(py-3) 및 글자 크기 축소(text-lg) 적용하여 부담스럽지 않고 깔끔하게 연출 -->
            <button id="start-btn" onclick="saveUserAndNext()" class="w-full max-w-xs py-3 bg-[var(--color-slate-blue)] hover:bg-[var(--color-sage-green)] text-white rounded-full font-bold text-lg shadow-md active:translate-y-1 transition-all gothic-text tracking-wider flex items-center justify-center gap-2">
                <span>오늘의 가방 싸러가기 ✨</span>
            </button>
        </div>

        <!-- 2. 캘린더 아카이브 페이지 -->
        <div id="calendar-view" class="absolute inset-0 z-[150] bg-[var(--color-cream)] flex flex-col page-transition hidden">
            <!-- 홈 화면 헤더와 완벽히 대칭되는 패딩과 배치 설정 (p-5, items-center) -->
            <header class="p-5 flex justify-between items-center shrink-0">
                <div>
                    <span id="user-welcome-title" class="text-[var(--color-sage-green)] font-bold text-xs tracking-wider gothic-text">안녕하세요!</span>
                    <h2 class="text-4xl font-bold italic text-slate-900 leading-none dongle-title">나의 요정 달력</h2>
                </div>
                
                <!-- 홈 바로가기 버튼 규격과 위치를 홈화면 캘린더 버튼과 100% 동일하게 일치시킴 -->
                <button onclick="backToMainApp()" class="p-2.5 bg-white border border-slate-100 rounded-xl text-[var(--color-slate-blue)] shadow-sm active:scale-95 transition-all flex items-center justify-center" title="홈으로">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
            </header>

            <div class="flex-1 bg-white mx-4 mb-8 rounded-[35px] border-4 border-white shadow-xl p-5 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-6 px-2 shrink-0">
                    <button onclick="prevMonth()" class="text-2xl font-bold p-2 text-[var(--color-sage-green)]">&lt;</button>
                    <h3 id="calendar-month-year" class="text-4xl font-bold text-slate-800 dongle-title">2026년 5월</h3>
                    <button onclick="nextMonth()" class="text-2xl font-bold p-2 text-[var(--color-sage-green)]">&gt;</button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center font-bold text-slate-300 text-xs mb-4 uppercase tracking-wider gothic-text">
                    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-2 flex-1 overflow-y-auto custom-scrollbar content-start"></div>
            </div>
        </div>

        <!-- 3. 메인 가방 구성 페이지 (홈 화면) -->
        <div id="main-app" class="absolute inset-0 opacity-0 pointer-events-none page-transition transform translate-y-10 hidden flex flex-col overflow-hidden">
            <!-- 캘린더 헤더와 완벽히 대칭되는 패딩과 배치 설정 (p-5, items-center) -->
            <header class="p-5 flex justify-between items-center z-10 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="flex flex-col ml-1">
                        <span id="editor-date-title" class="text-[var(--color-sage-green)] font-bold text-[10px] tracking-widest gothic-text">2026.05.22</span>
                        <h1 class="diary-title font-bold italic text-slate-900 dongle-title">오늘의 가방 기록</h1>
                    </div>
                </div>
                
                <!-- 캘린더 버튼 규격과 위치가 캘린더 화면의 홈버튼과 100% 동일한 좌표를 가짐 -->
                <button onclick="goToCalendar()" class="p-2.5 bg-white border border-slate-100 rounded-xl text-[var(--color-slate-blue)] shadow-sm active:scale-95 transition-all flex items-center justify-center" title="달력 보기">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </button>
            </header>

            <main id="drop-zone" class="h-[35vh] min-h-[250px] notebook-canvas relative mx-4 rounded-[28px] border-4 border-white shadow-md overflow-hidden touch-none shrink-0">
                <div id="empty-msg" class="absolute inset-0 flex flex-col items-center justify-center opacity-25 pointer-events-none z-10">
                    <p class="text-xl font-bold italic text-gray-400 dongle-title">아래 주머니에서 물건을 꺼내주세요!</p>
                </div>
                
                <div id="interactive-backpack-wrap" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-all duration-300 origin-center">
                    <svg id="interactive-backpack" class="text-indigo-400/25 w-40 h-40 transition-colors drop-shadow-[0_12px_24px_rgba(0,0,0,0.08)]" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M38 20 C38 12, 62 12, 62 20" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        <path d="M30 24 C20 30, 20 70, 30 80 M70 24 C80 30, 80 70, 70 80" stroke="currentColor" stroke-width="6" opacity="0.3" stroke-linecap="round"/>
                        <path d="M26 32 C26 18, 74 18, 74 32 C74 48, 72 82, 68 86 C64 90, 36 90, 32 86 C28 82, 26 48, 26 32 Z" fill="currentColor"/>
                        <path d="M26 32 C26 18, 74 18, 74 32 C74 42, 66 50, 50 50 C34 50, 26 42, 26 32 Z" fill="#ffffff" opacity="0.1"/>
                        <path d="M32 58 C32 52, 68 52, 68 58 C68 70, 66 84, 62 86 C58 88, 42 88, 38 86 C34 84, 32 70, 32 58 Z" fill="currentColor" filter="brightness(0.9)"/>
                        <path d="M32 58 L68 58" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.8"/>
                        <rect x="38" y="38" width="6" height="15" rx="1.5" fill="#5c554e" opacity="0.4"/>
                        <rect x="56" y="38" width="6" height="15" rx="1.5" fill="#5c554e" opacity="0.4"/>
                        <g id="bag-sweat" class="opacity-0 transition-opacity duration-300">
                            <path d="M64 56 Q66 59, 64 62 Q62 59, 64 56" fill="#60a5fa" opacity="0.8"/>
                            <path d="M36 61 Q38 64, 36 67 Q34 64, 36 61" fill="#60a5fa" opacity="0.8"/>
                        </g>
                        <g id="bag-face">
                            <path d="M43 68 Q45 65 47 68" stroke="#5c554e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                            <path d="M53 68 Q55 65 57 68" stroke="#5c554e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                            <path d="M48 71 Q50 74 52 71" stroke="#5c554e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                        </g>
                    </svg>
                </div>

                <div id="sticker-container" class="absolute inset-0 z-20"></div>

                <!-- 💡 디폴트 이모지를 🪶(깃털)로 세련되게 변경해 시각적인 부조화를 해결 -->
                <div class="absolute top-4 left-5 z-30 pointer-events-none">
                    <div class="flex items-center gap-2 drop-shadow-md">
                        <span id="status-emoji" class="text-4xl">🪶</span>
                        <span id="status-label" class="text-xl font-black text-slate-800 gothic-text tracking-tight" style="text-shadow: 0px 2px 4px rgba(255, 255, 255, 0.9), 0px 0px 2px rgba(255, 255, 255, 1), 0px 0px 10px rgba(255, 255, 255, 1);">깃털 가벼움</span>
                    </div>
                </div>

                <!-- 🔄 새로고침 버튼 상단 우측 고정 -->
                <div class="absolute top-4 right-4 z-30 pointer-events-auto">
                    <button onclick="clearAllItems()" class="bg-white/90 backdrop-blur-md hover:bg-slate-100 text-slate-500 p-2.5 rounded-full shadow-md active:scale-95 transition-all border border-slate-200 flex items-center justify-center" title="새로고침(모두 비우기)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                    </button>
                </div>

                <div class="absolute bottom-4 right-4 z-30 pointer-events-auto">
                    <button onclick="saveDiaryAndAnalyze()" class="bg-[var(--color-slate-blue)] hover:bg-[var(--color-sage-green)] text-white px-6 py-3 rounded-2xl font-bold text-xl shadow-[0_4px_10px_rgba(0,0,0,0.2)] active:scale-95 transition-all dongle-title border-2 border-white/85">
                        진단하기 🧚
                    </button>
                </div>
            </main>

            <!-- 하단 주머니 공간 -->
            <div class="flex-1 bg-white mx-4 mt-3 mb-4 rounded-[28px] border-4 border-white shadow-lg p-3 flex flex-col overflow-hidden relative">
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl mb-2 shrink-0">
                    <button onclick="switchTab('school')" id="tab-school" class="flex-1 py-1.5 rounded-lg font-bold text-xs bg-[var(--color-light-green)] text-[var(--color-sage-green)] shadow-sm transition-all gothic-text">SCHOOL</button>
                    <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-1.5 rounded-lg font-bold text-xs text-slate-400 transition-all gothic-text">DAILY</button>
                    <button onclick="switchTab('custom')" id="tab-custom" class="flex-1 py-1.5 rounded-lg font-bold text-xs text-slate-400 transition-all gothic-text">MY</button>
                </div>

                <!-- 부모 Grid를 col-4로 고정하여 절대 찌그러지지 않고 크기를 가두어 둠 -->
                <div class="relative flex-1 w-full overflow-hidden flex flex-col pt-1">
                    <div id="sticker-list" class="flex-1 grid grid-cols-4 gap-x-3 gap-y-4 overflow-y-auto custom-scrollbar pb-3 px-1 content-start"></div>
                    
                    <!-- 편집 모드 플로팅 아이콘 -->
                    <button id="edit-mode-btn" onclick="toggleEditMode()" class="hidden absolute bottom-3 right-1 w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center shadow-lg text-slate-500 transition-all active:scale-95 z-40">
                        <svg id="icon-pencil" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                        <svg id="icon-check" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="hidden text-[var(--color-sage-green)]"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                </div>

                <div id="custom-upload-area" class="hidden mt-2 shrink-0 flex gap-2 pt-2 border-t border-slate-100">
                    <label class="flex-1 flex flex-col items-center justify-center h-14 border border-dashed border-[var(--color-slate-blue)] rounded-xl bg-blue-50/20 active:bg-blue-100 cursor-pointer transition-colors">
                        <input type="file" class="hidden" accept="image/*" capture="environment" onchange="handleCustomUpload(event)">
                        <span class="text-lg mb-0.5">📸</span>
                        <p class="text-[10px] font-bold text-[var(--color-slate-blue)] gothic-text">카메라</p>
                    </label>
                    <label class="flex-1 flex flex-col items-center justify-center h-14 border border-dashed border-slate-200 rounded-xl bg-slate-50 active:bg-slate-100 cursor-pointer transition-colors">
                        <input type="file" class="hidden" accept="image/*" onchange="handleCustomUpload(event)">
                        <span class="text-lg mb-0.5 opacity-80">🖼️</span>
                        <p class="text-[10px] font-bold text-slate-400 gothic-text">갤러리</p>
                    </label>
                </div>
                
                <div id="upload-loading" class="hidden mt-2 items-center justify-center h-14 w-full bg-slate-50 rounded-xl border border-dashed border-slate-200">
                    <div class="animate-spin rounded-full h-4 w-4 border-2 border-[var(--color-slate-blue)] border-t-transparent"></div>
                    <span class="ml-2 text-[10px] font-bold text-slate-400 gothic-text">AI 배경 지우는 중... ✂️</span>
                </div>
            </div>
        </div>

        <!-- 일별 디테일 모달 -->
        <div id="day-detail-modal" class="absolute inset-0 z-[250] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
            <div class="bg-[#FAF7F2] w-full max-w-[320px] rounded-[35px] border-4 border-white shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300 max-h-[80vh]">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC3kS5rZRe4_mbrXsoM_rdQ-Ea5Y-lC400",
            authDomain: "my-bag-fairy.firebaseapp.com",
            projectId: "my-bag-fairy",
            storageBucket: "my-bag-fairy.firebasestorage.app",
            messagingSenderId: "28216222415",
            appId: "1:28216222415:web:aa70e0e6782b77b211cdba",
            measurementId: "G-PSZ7N7L211" 
        };

        const hasValidConfig = firebaseConfig && 
                             firebaseConfig.apiKey && 
                             firebaseConfig.apiKey !== "" && 
                             !firebaseConfig.apiKey.includes("YOUR_FIREBASE_CONFIG_HERE");

        let db = null;
        let auth = null;
        let currentUser = null;
        let isFirebaseEnabled = false;
        let appId = firebaseConfig.appId;

        if (hasValidConfig) {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                isFirebaseEnabled = true;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.warn("Firebase Auth Fail (Fallback to Local):", e);
                        isFirebaseEnabled = false;
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                });
            } catch (e) {
                console.error("Firebase Init Fail:", e);
                isFirebaseEnabled = false;
            }
        }

        window.FBDiary = {
            async loadUser(username, pin) {
                if (!isFirebaseEnabled || !currentUser) {
                    const savedDb = localStorage.getItem(`bag_fairy_diary_user_${username}`);
                    return savedDb ? JSON.parse(savedDb) : {};
                }
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', username);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists() && docSnap.data().pin === pin) {
                        return docSnap.data().diaryDatabase || {};
                    }
                } catch (e) { console.error(e); }
                return {};
            },
            async checkUserExists(username) {
                if (!isFirebaseEnabled || !currentUser) {
                    return localStorage.getItem(`bag_fairy_diary_user_${username}`) ? true : false;
                }
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', username);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) return { exists: true, pin: docSnap.data().pin };
                    return { exists: false };
                } catch (e) { console.error(e); }
                return { exists: false };
            },
            async saveUser(username, pin, diaryDatabase) {
                localStorage.setItem(`bag_fairy_diary_user_${username}`, JSON.stringify(diaryDatabase));
                localStorage.setItem(`bag_fairy_pin_${username}`, pin);
                if (!isFirebaseEnabled || !currentUser) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', username);
                    await setDoc(docRef, { 
                        username: username, 
                        pin: pin,
                        diaryDatabase: diaryDatabase, 
                        updated_at: new Date().toISOString() 
                    }, { merge: true });
                } catch (e) { console.error(e); }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('bag_fairy_username');
            const savedPin = localStorage.getItem(`bag_fairy_pin_${savedName}`);
            if (savedName && savedPin) {
                document.getElementById('username-input').value = savedName;
                document.getElementById('pin-input').value = savedPin;
                document.getElementById('landing-page').style.display = 'none';
                loadUserDatabase(savedName, savedPin);
            }
        });
    </script>

        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            daysContainer.innerHTML = '';
            const currentYear = calendarDate.getFullYear();
            const currentMonth = calendarDate.getMonth();
            document.getElementById('calendar-month-year').innerText = `${currentYear}년 ${currentMonth + 1}월`;

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) daysContainer.appendChild(document.createElement('div'));

            for (let day = 1; day <= lastDay; day++) {
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = "calendar-grid-cell hover:bg-slate-50 border border-slate-100 shadow-sm";
                
                const num = document.createElement('span');
                num.className = "absolute top-2 left-3 font-bold text-xs text-slate-400 gothic-text";
                num.innerText = day; cell.appendChild(num);

                if (diaryDatabase[dateKey]) {
                    const stamp = document.createElement('div');
                    stamp.className = "w-8 h-8 rounded-full flex items-center justify-center text-xl shadow-sm animate-pop";
                    stamp.style.backgroundColor = diaryDatabase[dateKey].status.color;
                    stamp.innerText = diaryDatabase[dateKey].status.emoji;
                    cell.appendChild(stamp);
                }
                if (dateKey === getTodayDateKey()) cell.classList.add("ring-2", "ring-[var(--color-slate-blue)]");
                cell.onclick = () => diaryDatabase[dateKey] ? openDayDetailModal(dateKey) : openEditorForDate(dateKey);
                daysContainer.appendChild(cell);
            }
        }

        // 모든 탭(프리셋 + 커스텀)의 아이콘 박스를 완벽한 정사각형으로 고정하고 텍스트가 잘리지 않는 레이아웃 연동
        function renderStickerList() {
            const list = document.getElementById('sticker-list');

            const isCustom = currentTab === 'custom';
            let items = isCustom ? customStickers : PRESETS[currentTab];
            
            const editBtn = document.getElementById('edit-mode-btn');
            if (isCustom && customStickers.length > 0) { editBtn.classList.remove('hidden'); } else { editBtn.classList.add('hidden'); isEditMode = false; }

            items.forEach((item, index) => {
                // 자식 최상단 div: 너비 높이를 절대 고정하지 않고, 부모 grid-cols-4에 따르며 flex-col 정렬 유지

                        addStickerToCanvas(item, 25 + Math.random() * 30, 25 + Math.random() * 30);
                    };
                }

                // 1:1 완벽한 반응형 정사각형 박스 구현 (padding-bottom 100% 기법 도입)
                // 이미지의 크기나 비율과 무관하게 무조건 동일한 크기의 사각형 박스가 바둑판을 이룹니다.
                const boxWrapper = document.createElement('div');
                boxWrapper.className = "relative w-full pb-[100%] bg-[#FAF7F2] rounded-2xl border border-slate-100 shadow-sm shrink-0";

                // 박스 중앙에 정렬되는 실제 이미지/이모지 영역
                const innerContainer = document.createElement('div');
                innerContainer.className = "absolute inset-0 flex items-center justify-center p-1.5 overflow-hidden";

                if (isEditMode && isCustom) {
                    const delBadge = document.createElement('div');
                    delBadge.className = "absolute -top-1.5 -right-1.5 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-[10px] font-bold shadow-md cursor-pointer z-50 hover:scale-110 pointer-events-auto";
                    delBadge.innerHTML = "✕";
                    
                    const handleDel = (e) => { e.preventDefault(); e.stopPropagation(); deleteCustomSticker(index); };
                    delBadge.addEventListener('click', handleDel);
                    delBadge.addEventListener('touchend', handleDel);
                    boxWrapper.appendChild(delBadge);
                }

                if (item.isCustomImage) {
                    innerContainer.innerHTML = `<img src="${item.image}" crossorigin="anonymous" class="w-full h-full object-contain sticker-die-cut" style="pointer-events:none;">`;
                } else {
                    innerContainer.innerHTML = createStickerHTML(item, "text-3xl");
                }
                boxWrapper.appendChild(innerContainer);

                // 이름 텍스트 높이 및 폰트 크기 완벽 통일
                const name = document.createElement('p');
                name.className = "text-[10px] font-bold text-slate-700 w-full text-center gothic-text leading-tight select-none mt-1.5 h-8 overflow-hidden break-keep";
                name.innerText = item.name;
                name.style.display = "-webkit-box";
                name.style.webkitLineClamp = "2";
                name.style.webkitBoxOrient = "vertical";

                if (isEditMode && isCustom) {
                    name.classList.add('bg-slate-200', 'rounded-md', 'px-1', 'py-0.5', 'cursor-pointer', 'hover:bg-slate-300', 'pointer-events-auto', 'z-50');
                    const handleRename = (e) => { e.preventDefault(); e.stopPropagation(); renameCustomSticker(index); };
                    name.addEventListener('click', handleRename);
                    name.addEventListener('touchend', handleRename);
                }

                div.appendChild(boxWrapper); 
                div.appendChild(name); 
                list.appendChild(div);

                // 드래그 앤 드롭 바인딩
                if (!isEditMode) {
                    let ghost = null; let startX = 0, startY = 0; let hasMoved = false;
                    const onDragStart = (e) => {
                        hasMoved = false;
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        startX = clientX; startY = clientY;
                        ghost = document.createElement('div'); ghost.className = "ghost-sticker w-14 h-14"; ghost.style.left = `${clientX - 28}px`; ghost.style.top = `${clientY - 28}px`;
                        if (item.isCustomImage) { ghost.innerHTML = `<img src="${item.image}" crossorigin="anonymous" class="w-14 h-14 object-contain sticker-die-cut" style="pointer-events:none;">`; } else { ghost.innerHTML = createStickerHTML(item, "text-5xl"); }
                        document.body.appendChild(ghost);
                        if (e.touches) { window.addEventListener('touchmove', onDragMove, { passive: false }); window.addEventListener('touchend', onDragEnd); } else { window.addEventListener('mousemove', onDragMove); window.addEventListener('mouseup', onDragEnd); }
                    };
                    const onDragMove = (e) => {
                        if (!ghost) return;
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        if (Math.abs(clientX - startX) > 10 || Math.abs(clientY - startY) > 10) { hasMoved = true; div.dataset.dragged = 'true'; }
                        if (hasMoved) { e.preventDefault(); ghost.style.left = `${clientX - 28}px`; ghost.style.top = `${clientY - 28}px`; }
                    };
                    const onDragEnd = (e) => {
                        if (e.touches) { window.removeEventListener('touchmove', onDragMove); window.removeEventListener('touchend', onDragEnd); } else { window.removeEventListener('mousemove', onDragMove); window.removeEventListener('mouseup', onDragEnd); }
                        if (!ghost) return;
                        const dropZone = document.getElementById('drop-zone'); const dropRect = dropZone.getBoundingClientRect();
                        const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX; const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                        if (hasMoved && clientX >= dropRect.left && clientX <= dropRect.right && clientY >= dropRect.top && clientY <= dropRect.bottom) {
                            const dropXPercent = ((clientX - dropRect.left - 28) / dropRect.width) * 100; const dropYPercent = ((clientY - dropRect.top - 28) / dropRect.height) * 100;
                            addStickerToCanvas(item, dropXPercent, dropYPercent);
                        }
                        if (ghost) { ghost.remove(); ghost = null; }
                    };
                    div.addEventListener('mousedown', onDragStart); div.addEventListener('touchstart', onDragStart, { passive: true });
                }
            });
        }

        async function handleCustomUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const buttonsArea = document.getElementById('custom-upload-area');
            const loadingArea = document.getElementById('upload-loading');
            
            buttonsArea.classList.add('hidden');
            loadingArea.classList.remove('hidden'); loadingArea.classList.add('flex');

            if (REMOVE_BG_API_KEY) {
                const formData = new FormData();
                formData.append('size', 'auto');
                formData.append('image_file', file);

                try {
                    const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                        method: 'POST',
                        headers: { 'X-Api-Key': REMOVE_BG_API_KEY },
                        body: formData
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            tempCustomItem = { name: "내 짐", weight: 0.5, emoji: '✨', image: reader.result, isCustomImage: true };
                            finishUpload();
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                } catch (err) { console.error("API 통신 에러:", err); }
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                setTimeout(() => {
                    tempCustomItem = { name: "내 짐", weight: 0.5, emoji: '✨', image: event.target.result, isCustomImage: true };
                    finishUpload();
                }, 1200);
            };
            reader.readAsDataURL(file);

            function finishUpload() {
                loadingArea.classList.add('hidden'); loadingArea.classList.remove('flex');
                buttonsArea.classList.remove('hidden');
                openCustomNameModal(tempCustomItem);
            }
        }

        function addStickerToCanvas(item, xPercent, yPercent, isRecovery = false) {
            document.getElementById('empty-msg').style.display = 'none';
            const id = isRecovery ? item.id : Date.now() + '-' + Math.floor(Math.random() * 1000);
            const rotation = isRecovery ? item.rotation : (Math.random() * 24 - 12);
            
            const sticker = document.createElement('div');
            sticker.id = `sticker-${id}`; sticker.className = "draggable-sticker animate-pop w-14 h-14";
            sticker.style.left = `${xPercent}%`; sticker.style.top = `${yPercent}%`; sticker.style.transform = `rotate(${rotation}deg)`;

            if (item.isCustomImage) { sticker.innerHTML = `<img src="${item.image}" crossorigin="anonymous" class="w-14 h-14 object-contain sticker-die-cut" style="pointer-events:none;">`; } else if (item.image) { sticker.innerHTML = `<img src="${item.image}" crossorigin="anonymous" class="w-14 h-14 object-contain sticker-die-cut" style="pointer-events:none;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><span class="hidden text-5xl sticker-die-cut" style="pointer-events:none;">${item.emoji}</span>`; } else { sticker.innerHTML = `<span class="text-5xl select-none sticker-die-cut" style="pointer-events:none;">${item.emoji}</span>`; }

            const label = document.createElement('span'); label.className = "sticker-label shadow-sm absolute -bottom-5 left-1/2 transform -translate-x-1/2";
            label.innerText = item.name; sticker.appendChild(label);
            document.getElementById('sticker-container').appendChild(sticker);

            const canvasItem = { id, name: item.name, weight: item.weight, emoji: item.emoji || null, image: item.image || null, x: xPercent, y: yPercent, rotation, isCustomImage: item.isCustomImage || false };
            currentItems.push(canvasItem);

            if (!isRecovery) {
                triggerBagJiggle();
                if (window.gtag) window.gtag('event', 'put_item_in_bag', { item_name: item.name, weight: item.weight });
            }

            let isDragging = false, isClick = true, startX, startY, initialLeft, initialTop, touchStartTime = 0;
            const deleteAction = () => {
                sticker.classList.add("scale-0", "transition-all", "duration-200");
                setTimeout(() => {
                    sticker.remove(); currentItems = currentItems.filter(i => i.id !== id); updateStatus(); triggerBagJiggle();
                    if (currentItems.length === 0) document.getElementById('empty-msg').style.display = 'flex';
                }, 200);
            };

            const onStart = (e) => {
                isDragging = true; isClick = true; touchStartTime = Date.now(); sticker.classList.add('dragging');
                const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX; startY = clientY; initialLeft = sticker.offsetLeft; initialTop = sticker.offsetTop;
            };
            const onMove = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                if (Math.abs(clientX - startX) > 8 || Math.abs(clientY - startY) > 8) isClick = false;
                if (!isClick) {
                    let nl = initialLeft + (clientX - startX), nt = initialTop + (clientY - startY);
                    sticker.style.left = `${nl}px`; sticker.style.top = `${nt}px`;
                    canvasItem.x = (nl / document.getElementById('drop-zone').clientWidth) * 100; canvasItem.y = (nt / document.getElementById('drop-zone').clientHeight) * 100;
                }
            };
            const onEnd = () => { if (!isDragging) return; isDragging = false; sticker.classList.remove('dragging'); const touchDuration = Date.now() - touchStartTime; if (isClick && touchDuration < 300) { deleteAction(); } else { updateStatus(); } };

            sticker.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
            sticker.addEventListener('touchstart', onStart, { passive: true }); window.addEventListener('touchmove', onMove, { passive: true }); window.addEventListener('touchend', onEnd);
            updateStatus();
        }

        function triggerBagJiggle() { const bag = document.getElementById('interactive-backpack-wrap'); bag.classList.remove('bag-jiggle'); void bag.offsetWidth; bag.classList.add('bag-jiggle'); }

        function updateStatus() {

                    if (bagSweat) { bagSweat.classList.remove('opacity-0'); bagSweat.classList.add('opacity-100'); }

                const div = document.createElement('div'); div.className = "flex flex-col items-center gap-1 w-full";
                let visualEl = item.image ? `<img src="${item.image}" crossorigin="anonymous" class="w-10 h-10 object-contain sticker-die-cut">` : `<span class="sticker-die-cut text-2xl">${item.emoji}</span>`;
                div.innerHTML = `<div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-100 overflow-hidden">${visualEl}</div><p class="text-[10px] text-center font-bold text-slate-500 truncate w-full">${item.name}</p>`;
                list.appendChild(div);
            });
            const modal = document.getElementById('day-detail-modal'); modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.style.opacity = '1'; modal.querySelector('div').style.transform = 'scale(1)'; }, 10);
        }

        function closeDayDetailModal() { const modal = document.getElementById('day-detail-modal'); modal.style.opacity = '0'; setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300); }
        function editFromDetail() { closeDayDetailModal(); setTimeout(() => openEditorForDate(selectedDateKey), 300); }
        function closeModalAndCalendar() { document.getElementById('result-modal').classList.add('hidden'); goToCalendar(); }
    </script>
</body>
</html>
